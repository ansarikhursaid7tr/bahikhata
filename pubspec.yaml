name: bahi_khata
description: "BahiKhata - Digital Ledger for Shop, Staff & Personal Records"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.3

  # UI
  google_fonts: ^8.1.0
  intl: ^0.20.2

  # Export / PDF
  pdf: ^3.12.0
  printing: ^5.14.3
  csv: ^8.0.0
  path_provider: ^2.1.5
  share_plus: ^13.1.0

  # Utils
  uuid: ^4.5.3
  connectivity_plus: ^7.1.1
  image_picker: ^1.2.2
  nepali_utils: ^3.0.8
  nepali_date_picker: ^7.0.1
  shimmer: ^3.0.0
  local_auth: ^3.0.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo/
