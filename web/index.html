<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BahiKhata - Business Management App">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BahiKhata">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BahiKhata</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Loading screen styles */
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1A1B4B 0%, #283593 50%, #5C6BC0 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }
    .loading-logo {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .loading-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 40px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Beautiful loading screen shown while Flutter initializes -->
  <div class="loading-container" id="loading">
    <div class="loading-logo">📒 BahiKhata</div>
    <div class="loading-subtitle">Loading your workspace...</div>
    <div class="loading-spinner"></div>
  </div>

  <script>
    // Configure Flutter to use the HTML renderer on mobile for faster load,
    // and CanvasKit on desktop for better visual fidelity.
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      config: {
        renderer: "canvaskit",
      },
      onEntrypointLoaded: async function(engineInitializer) {
        // Unregister any existing service workers so users always get the latest
        // deployment from Vercel upon reloading the page.
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
            }
          });
        }

        const appRunner = await engineInitializer.initializeEngine();
        await appRunner.runApp();
        // Hide loading screen once Flutter is painted
        const loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
